name: "avm.ptn.ai-ml.landing-zone"

on:
  workflow_dispatch:
    inputs:
      staticValidation:
        type: boolean
        description: "Execute static validation"
        required: false
        default: true
      deploymentValidation:
        type: boolean
        description: "Execute deployment validation"
        required: false
        default: true
      removeDeployment:
        type: boolean
        description: "Remove deployed module"
        required: false
        default: true
      customLocation:
        type: string
        description: "Default location overwrite (e.g., eastus)"
        required: false
  push:
    branches:
      - main
    paths:
      - ".github/actions/templates/avm-**"
      - ".github/workflows/avm.template.module.yml"
      - ".github/workflows/avm.ptn.ai-ml.landing-zone.yml"
      - "avm/ptn/ai-ml/landing-zone/**"
      - "utilities/pipelines/**"
      - "!utilities/pipelines/platform/**"
      - "!*/**/child-module-publish-allowed-list.json"
      - "!*/**/README.md"

env:
  modulePath: "avm/ptn/ai-ml/landing-zone"
  workflowPath: ".github/workflows/avm.ptn.ai-ml.landing-zone.yml"

concurrency:
  group: ${{ github.workflow }}

jobs:
  job_initialize_pipeline:
    runs-on: ubuntu-latest
    name: "Initialize pipeline"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Set input parameters to output variables"
        id: get-workflow-param
        uses: ./.github/actions/templates/avm-getWorkflowInput
        with:
          workflowPath: "${{ env.workflowPath}}"
      - name: "Get module test file paths"
        id: get-module-test-file-paths
        uses: ./.github/actions/templates/avm-getModuleTestFiles
        with:
          modulePath: "${{ env.modulePath }}"
      - name: "Override PSRule targets (skip template PSRule)"
        id: override-psrule
        shell: bash
        run: |
          # Pass an empty list so the template does not schedule any PSRule jobs
          echo "psRuleModuleTestFilePaths=[]" >> "$GITHUB_OUTPUT"
    outputs:
      workflowInput: ${{ steps.get-workflow-param.outputs.workflowInput }}
      moduleTestFilePaths: ${{ steps.get-module-test-file-paths.outputs.moduleTestFilePaths }}
      # psRuleModuleTestFilePaths: ${{ steps.get-module-test-file-paths.outputs.psRuleModuleTestFilePaths }}
      psRuleModuleTestFilePaths: ${{ steps.override-psrule.outputs.psRuleModuleTestFilePaths }}
      modulePath: "${{ env.modulePath }}"

  psrule_static_validation:
    name: "PSRule (module-only) — extended timeout"
    runs-on: ubuntu-latest
    needs: [ job_initialize_pipeline ]
    # Honor your input flag
    if: ${{ fromJson(needs.job_initialize_pipeline.outputs.workflowInput).staticValidation == true }}
    steps:
      - uses: actions/checkout@v4

      - name: "Run PSRule"
        uses: microsoft/ps-rule@v2
        env:
          # Increase Bicep file expansion timeout (seconds)
          AZURE_BICEP_FILE_EXPANSION_TIMEOUT: 180
        with:
          modules: PSRule.Rules.Azure
          inputPath: |
            avm/ptn/ai-ml/landing-zone/tests/e2e/defaults/**/*.bicep
            avm/ptn/ai-ml/landing-zone/tests/e2e/waf-aligned/**/*.bicep
          # If you use named baselines in your repo, you can call them one-by-one:
          # baseline: Reliability


  call-workflow-passing-data:
    name: "Run"
    permissions:
      id-token: write
      contents: write
    needs: [ job_initialize_pipeline, psrule_static_validation  ]
    uses: ./.github/workflows/avm.template.module.yml
    with:
      workflowInput: "${{ needs.job_initialize_pipeline.outputs.workflowInput }}"
      moduleTestFilePaths: "${{ needs.job_initialize_pipeline.outputs.moduleTestFilePaths }}"
      psRuleModuleTestFilePaths: "${{ needs.job_initialize_pipeline.outputs.psRuleModuleTestFilePaths }}"
      modulePath: "${{ needs.job_initialize_pipeline.outputs.modulePath}}"
    secrets: inherit


